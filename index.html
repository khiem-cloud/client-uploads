<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Your Files</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── PASTE YOUR SCRIPT URL HERE ─────────────────────────── */
    /* Find: YOUR_SCRIPT_URL  Replace with your deployed URL    */
    /* ─────────────────────────────────────────────────────── */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #faf8f4;
      --ink:     #1a1814;
      --mid:     #6b6760;
      --accent:  #c9783c;
      --border:  #e2ddd6;
      --success: #3a7d5a;
      --error:   #c0392b;
      --shadow:  0 4px 24px rgba(26,24,20,0.08);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(201,120,60,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 10% 90%, rgba(201,120,60,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 520px;
      padding: 3rem 3rem 2.5rem;
      position: relative;
      animation: rise 0.5s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      margin-bottom: 2rem;
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--mid);
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 0.45rem;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--ink);
      background: var(--cream);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,120,60,0.12);
      background: #fff;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--cream);
      margin-bottom: 1.25rem;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(201,120,60,0.04);
    }

    .drop-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .drop-zone p {
      font-size: 0.88rem;
      color: var(--mid);
      line-height: 1.5;
    }

    .drop-zone strong {
      color: var(--accent);
      cursor: pointer;
    }

    input[type="file"] { display: none; }

    .file-list {
      list-style: none;
      margin-bottom: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.55rem 0.8rem;
      font-size: 0.85rem;
      animation: pop 0.2s ease both;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .file-item .file-icon { font-size: 1rem; flex-shrink: 0; }
    .file-item .file-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink); }
    .file-item .file-size { color: var(--mid); font-size: 0.78rem; white-space: nowrap; }
    .file-item .remove-btn {
      background: none; border: none; cursor: pointer;
      color: var(--mid); font-size: 1rem; padding: 0 0.2rem;
      transition: color 0.15s;
    }
    .file-item .remove-btn:hover { color: var(--error); }

    .submit-btn {
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .submit-btn:hover:not(:disabled) { background: #2d2b27; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .progress-wrap {
      margin-top: 1.25rem;
      display: none;
    }

    .progress-label {
      font-size: 0.8rem;
      color: var(--mid);
      margin-bottom: 0.4rem;
      display: flex;
      justify-content: space-between;
    }

    .progress-bar {
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .toast {
      display: none;
      margin-top: 1.25rem;
      padding: 0.9rem 1.1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      animation: rise 0.3s ease both;
    }

    .toast.success { background: #edf7f2; color: var(--success); border: 1px solid #b7dfc9; }
    .toast.error   { background: #fdf0ef; color: var(--error);   border: 1px solid #f1c0bb; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.75rem 0;
    }

    .footer-note {
      font-size: 0.78rem;
      color: var(--mid);
      text-align: center;
      font-weight: 300;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-area">
    <div class="logo-dot"></div>
    <h1>Send us your <em>files</em></h1>
    <p class="subtitle">Fill in your details and drop your files below — we'll take it from there.</p>
  </div>

  <div class="field">
    <label for="name">Your Name</label>
    <input type="text" id="name" placeholder="Jane Smith" autocomplete="name" />
  </div>

  <div class="field">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="jane@example.com" autocomplete="email" />
  </div>

  <div class="field">
    <label>Files</label>
    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">📂</span>
      <p>Drag & drop files here, or <strong id="browseLink">browse</strong></p>
      <p style="margin-top:0.3rem; font-size:0.8rem;">Any file type accepted</p>
    </div>
    <input type="file" id="fileInput" multiple />
    <ul class="file-list" id="fileList"></ul>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
    Upload Files
  </button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">Uploading...</span>
      <span id="progressCount"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="divider"></div>
  <p class="footer-note">Your files are uploaded securely and privately.</p>
</div>

<script>
  // ⚠️ REPLACE THIS with your Google Apps Script Web App URL
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4AwYpBFSrYzxEwL86wOaA7tNj3xIVnkal6A4KfBhQepdAHHJh7qAARTGhOJA54QI/exec";

  let selectedFiles = [];

  // Drag & drop
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  document.getElementById('browseLink').onclick = () => fileInput.click();
  dropZone.onclick = (e) => { if (e.target.id !== 'browseLink') fileInput.click(); };

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files]);
  });

  fileInput.addEventListener('change', () => {
    addFiles([...fileInput.files]);
    fileInput.value = '';
  });

  function addFiles(newFiles) {
    newFiles.forEach(f => {
      if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) {
        selectedFiles.push(f);
      }
    });
    renderFileList();
  }

  function removeFile(index) {
    selectedFiles.splice(index, 1);
    renderFileList();
  }

  function renderFileList() {
    const list = document.getElementById('fileList');
    list.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const li = document.createElement('li');
      li.className = 'file-item';
      li.innerHTML = `
        <span class="file-icon">${getFileIcon(f.name)}</span>
        <span class="file-name">${f.name}</span>
        <span class="file-size">${formatSize(f.size)}</span>
        <button class="remove-btn" onclick="removeFile(${i})" title="Remove">✕</button>
      `;
      list.appendChild(li);
    });
  }

  function getFileIcon(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (['jpg','jpeg','png','gif','webp','svg'].includes(ext)) return '🖼️';
    if (['pdf'].includes(ext)) return '📄';
    if (['doc','docx'].includes(ext)) return '📝';
    if (['xls','xlsx','csv'].includes(ext)) return '📊';
    if (['zip','rar','7z'].includes(ext)) return '🗜️';
    if (['mp4','mov','avi'].includes(ext)) return '🎬';
    if (['mp3','wav','aac'].includes(ext)) return '🎵';
    return '📎';
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1048576).toFixed(1) + ' MB';
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    t.style.display = 'block';
  }

  function toBase64(file) {
    return new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload = () => res(reader.result.split(',')[1]);
      reader.onerror = rej;
      reader.readAsDataURL(file);
    });
  }

  async function handleSubmit() {
    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();

    if (!name)  return showToast('Please enter your name.', 'error');
    if (!email || !email.includes('@')) return showToast('Please enter a valid email.', 'error');
    if (selectedFiles.length === 0) return showToast('Please add at least one file.', 'error');
    if (SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbx4AwYpBFSrYzxEwL86wOaA7tNj3xIVnkal6A4KfBhQepdAHHJh7qAARTGhOJA54QI/exec') return showToast('⚠️ Script URL not configured yet.', 'error');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Uploading...';

    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const progressCount = document.getElementById('progressCount');
    progressWrap.style.display = 'block';
    document.getElementById('toast').style.display = 'none';

    let succeeded = 0;
    let failed = 0;

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      progressText.textContent = `Uploading "${file.name}"…`;
      progressCount.textContent = `${i+1} / ${selectedFiles.length}`;
      progressFill.style.width = `${Math.round(((i) / selectedFiles.length) * 100)}%`;

      try {
        const base64 = await toBase64(file);
        const formData = new URLSearchParams({
          name,
          email,
          fileName: file.name,
          mimeType: file.type || 'application/octet-stream',
          fileData: base64
        });

        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: formData,
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });

        const json = await res.json();
        if (json.success) succeeded++;
        else failed++;
      } catch {
        failed++;
      }
    }

    progressFill.style.width = '100%';
    progressText.textContent = 'Done!';
    progressCount.textContent = '';

    btn.disabled = false;
    btn.innerHTML = 'Upload Files';

    if (failed === 0) {
      showToast(`✅ ${succeeded} file${succeeded > 1 ? 's' : ''} uploaded successfully! Thank you, ${name}.`, 'success');
      selectedFiles = [];
      renderFileList();
      document.getElementById('name').value = '';
      document.getElementById('email').value = '';
      setTimeout(() => { progressWrap.style.display = 'none'; progressFill.style.width = '0%'; }, 3000);
    } else {
      showToast(`⚠️ ${succeeded} uploaded, ${failed} failed. Please try again.`, 'error');
    }
  }
</script>

</body>
</html>
